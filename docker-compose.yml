services:
  ai-service:
    build:
      context: .
      dockerfile: docker/ai-service.Dockerfile
    env_file: .env
    ports:
      - "${AI_SERVICE_PORT:-8080}:8080"
    volumes:
      - ai-service-data:/data
    restart: unless-stopped
    extra_hosts:
        - "host.docker.internal:host-gateway"

volumes:
  model-cache:
  ai-service-data:
