services:
  ai-service:
    build:
      context: .
      dockerfile: docker/ai-service.Dockerfile
    env_file: .env
    environment:
      WHISPER_API_URL: ${WHISPER_API_URL:-http://whisper-api:8000/v1}
      WHISPER_API_KEY: ${WHISPER_API_KEY:-}
    ports:
      - "${AI_SERVICE_PORT:-8080}:8080"
    volumes:
      - ai-service-data:/data
    restart: unless-stopped

volumes:
  model-cache:
  ai-service-data:
