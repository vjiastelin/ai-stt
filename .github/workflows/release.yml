name: release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
# The tag must match `version` in pyproject.toml.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  # Guard: refuse to release if the git tag and pyproject version disagree.
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          proj="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "git tag: $tag | pyproject: $proj"
          if [ "$tag" != "$proj" ]; then
            echo "::error::git tag v$tag does not match pyproject version $proj"
            exit 1
          fi

  build-push:
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: whisper-api
            dockerfile: docker/whisper-api.Dockerfile
          - service: ai-service
            dockerfile: docker/ai-service.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            # `latest` only on final releases, never on prereleases (v1.2.3-rc1)
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64   # GPU deploy targets are x86; skip slow ARM emulation
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  github-release:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so release notes can diff against the last tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
